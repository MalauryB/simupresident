<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#556C96"/>
      <stop offset="100%" stop-color="#3D4F6F"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF584D"/>
      <stop offset="100%" stop-color="#FF7B73"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Urne body -->
  <rect x="8" y="14" width="16" height="11" rx="2" fill="#fff" opacity="0.92"/>
  <!-- Urne lid -->
  <rect x="7" y="12" width="18" height="3.5" rx="1.5" fill="#fff"/>
  <!-- Slot -->
  <rect x="12.5" y="13" width="7" height="1.5" rx="0.75" fill="#556C96" opacity="0.5"/>
  <!-- Ballot -->
  <g transform="rotate(-10, 16, 9)">
    <rect x="12" y="4" width="8" height="9.5" rx="1.2" fill="#fff" stroke="#ccc" stroke-width="0.4"/>
    <polyline points="14,8 15.5,10 18.5,6.5" fill="none" stroke="url(#ac)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Tricolor -->
  <rect x="8" y="22" width="5.3" height="1.2" fill="#0055A4"/>
  <rect x="13.3" y="22" width="5.4" height="1.2" fill="#fff"/>
  <rect x="18.7" y="22" width="5.3" height="1.2" fill="#EF4135"/>
  <!-- ? -->
  <text x="26" y="11" font-size="9" font-weight="800" fill="url(#ac)" font-family="system-ui,sans-serif">?</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#556C96"/>
      <stop offset="100%" stop-color="#3D4F6F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF584D"/>
      <stop offset="100%" stop-color="#FF7B73"/>
    </linearGradient>
    <linearGradient id="urne" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E8ECF2" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle decorative circles -->
  <circle cx="400" cy="100" r="120" fill="#FFFFFF" opacity="0.03"/>
  <circle cx="80" cy="420" r="90" fill="#FFFFFF" opacity="0.03"/>

  <!-- Ballot box body -->
  <rect x="136" y="230" width="240" height="170" rx="18" fill="url(#urne)"/>

  <!-- Ballot box lid -->
  <rect x="124" y="210" width="264" height="36" rx="10" fill="#FFFFFF"/>

  <!-- Ballot slot -->
  <rect x="210" y="220" width="92" height="10" rx="5" fill="#556C96" opacity="0.5"/>

  <!-- Ballot paper being inserted -->
  <g transform="rotate(-8, 256, 180)">
    <rect x="218" y="120" width="76" height="100" rx="6" fill="#FFFFFF" stroke="#E0E4EA" stroke-width="2"/>
    <!-- Checkmark on ballot -->
    <polyline points="238,165 252,180 278,148" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Tricolor band (French flag accent) on box -->
  <g clip-path="url(#boxClip)">
    <rect x="136" y="370" width="80" height="8" rx="0" fill="#0055A4"/>
    <rect x="216" y="370" width="80" height="8" rx="0" fill="#FFFFFF"/>
    <rect x="296" y="370" width="80" height="8" rx="0" fill="#EF4135"/>
  </g>

  <!-- Question mark -->
  <text x="388" y="180" font-size="100" font-weight="800" fill="url(#accent)" font-family="system-ui, sans-serif" opacity="0.9">?</text>

  <!-- "QSP" text at bottom -->
  <text x="256" y="455" font-size="42" font-weight="800" fill="#FFFFFF" text-anchor="middle" font-family="system-ui, sans-serif" letter-spacing="6" opacity="0.9">QSP</text>
</svg>

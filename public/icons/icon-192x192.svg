<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#556C96"/>
      <stop offset="100%" stop-color="#3D4F6F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF584D"/>
      <stop offset="100%" stop-color="#FF7B73"/>
    </linearGradient>
    <linearGradient id="urne" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E8ECF2" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>

  <!-- Ballot box body -->
  <rect x="48" y="84" width="96" height="68" rx="8" fill="url(#urne)"/>

  <!-- Ballot box lid -->
  <rect x="43" y="76" width="106" height="16" rx="5" fill="#FFFFFF"/>

  <!-- Ballot slot -->
  <rect x="76" y="80" width="40" height="5" rx="2.5" fill="#556C96" opacity="0.5"/>

  <!-- Ballot paper -->
  <g transform="rotate(-8, 96, 64)">
    <rect x="78" y="40" width="36" height="42" rx="3" fill="#FFFFFF" stroke="#E0E4EA" stroke-width="1.2"/>
    <polyline points="86,58 92,65 104,51" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Tricolor band -->
  <rect x="48" y="138" width="32" height="4" fill="#0055A4"/>
  <rect x="80" y="138" width="32" height="4" fill="#FFFFFF"/>
  <rect x="112" y="138" width="32" height="4" fill="#EF4135"/>

  <!-- Question mark -->
  <text x="146" y="66" font-size="40" font-weight="800" fill="url(#accent)" font-family="system-ui, sans-serif" opacity="0.9">?</text>

  <!-- "QSP" text -->
  <text x="96" y="174" font-size="17" font-weight="800" fill="#FFFFFF" text-anchor="middle" font-family="system-ui, sans-serif" letter-spacing="3" opacity="0.9">QSP</text>
</svg>
